name: Program D2 Dirac spectral geometry

on:
  push:
    branches:
      - main
      - research/fundamental-geometry-dirac-spectral
      - research/fundamental-geometry-d
      - "agent/**"
    paths:
      - "JanusFormal/Branches/FundamentalGeometryDiracSpectral.lean"
      - "JanusFormal/Branches/FundamentalGeometryDiracSpectral/**"
      - "docs/janus_program_d_dirac_spectral_geometry.md"
      - "scripts/audit_janus_dirac_spectral_geometry.py"
      - "tests/test_janus_dirac_spectral_geometry.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/fundamental-geometry-dirac-spectral.yml"
  pull_request:
    paths:
      - "JanusFormal/Branches/FundamentalGeometryDiracSpectral.lean"
      - "JanusFormal/Branches/FundamentalGeometryDiracSpectral/**"
      - "docs/janus_program_d_dirac_spectral_geometry.md"
      - "scripts/audit_janus_dirac_spectral_geometry.py"
      - "tests/test_janus_dirac_spectral_geometry.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/fundamental-geometry-dirac-spectral.yml"
  workflow_dispatch:

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Build Dirac spectral branch head
        run: lake build JanusFormal.Branches.FundamentalGeometryDiracSpectral

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: python scripts/audit_janus_dirac_spectral_geometry.py
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_janus_dirac_spectral_geometry.py
