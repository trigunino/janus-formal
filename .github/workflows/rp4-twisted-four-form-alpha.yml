name: RP4 twisted four-form alpha

on:
  push:
    branches:
      - research/rp4-twisted-four-form-alpha
    paths:
      - "JanusFormal/Branches/RP4TwistedFourFormAlpha.lean"
      - "JanusFormal/Branches/RP4TwistedFourFormAlpha/**"
      - "scripts/audit_janus_*"
      - "tests/test_janus_*"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/rp4-twisted-four-form-alpha.yml"
  pull_request:
    branches:
      - main
    paths:
      - "JanusFormal/Branches/RP4TwistedFourFormAlpha.lean"
      - "JanusFormal/Branches/RP4TwistedFourFormAlpha/**"
      - "scripts/audit_janus_*"
      - "tests/test_janus_*"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
  workflow_dispatch:

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Build focused branch head
        run: |
          set +e
          lake build JanusFormal.Branches.RP4TwistedFourFormAlpha > lean-build.log 2>&1
          status=$?
          cat lean-build.log
          exit $status
      - name: Upload focused Lean log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rp4-twisted-four-form-lean-log
          path: lean-build.log
          if-no-files-found: error

  python-audits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e . pytest
      - run: python scripts/audit_janus_exact_solution_normalization.py
      - run: python scripts/audit_janus_finite_bridge_ll_closure.py
      - name: Run focused Python tests
        env:
          PYTHONPATH: .
        run: python -m pytest -q tests/test_janus_finite_bridge_ll_closure.py
