name: Program PE jet universality

on:
  push:
    branches:
      - main
      - research/fundamental-geometry-d
    paths:
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality.lean"
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality/**"
      - "docs/program_master_roadmap.md"
      - "docs/program_pe_jet_universality_proof.md"
      - "docs/program_pe_lemma2_naturality_equivariance.md"
      - "docs/program_pe_categorical_jet_equivalence.md"
      - "docs/program_pe_structured_jet_reduction.md"
      - "docs/program_pe_low_order_structured_background.md"
      - "docs/program_pe_second_fundamental_form_jet.md"
      - "docs/program_pe_smooth_adapted_frames.md"
      - "docs/program_pe_spinC_cocycle_lift.md"
      - "docs/program_pe_metric_normal_connection_curvature.md"
      - "docs/program_pe_normal_connection_from_frame_jet.md"
      - "scripts/audit_janus_pe_jet_universality.py"
      - "scripts/audit_janus_low_order_jet_normal_forms.py"
      - "scripts/audit_janus_metric_normal_ricci.py"
      - "tests/test_janus_pe_jet_universality.py"
      - "tests/test_janus_low_order_jet_normal_forms.py"
      - "tests/test_janus_metric_normal_ricci.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/pe-jet-universality.yml"
  pull_request:
    paths:
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality.lean"
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality/**"
      - "docs/program_master_roadmap.md"
      - "docs/program_pe_jet_universality_proof.md"
      - "docs/program_pe_lemma2_naturality_equivariance.md"
      - "docs/program_pe_categorical_jet_equivalence.md"
      - "docs/program_pe_structured_jet_reduction.md"
      - "docs/program_pe_low_order_structured_background.md"
      - "docs/program_pe_second_fundamental_form_jet.md"
      - "docs/program_pe_smooth_adapted_frames.md"
      - "docs/program_pe_spinC_cocycle_lift.md"
      - "docs/program_pe_metric_normal_connection_curvature.md"
      - "docs/program_pe_normal_connection_from_frame_jet.md"
      - "scripts/audit_janus_pe_jet_universality.py"
      - "scripts/audit_janus_low_order_jet_normal_forms.py"
      - "scripts/audit_janus_metric_normal_ricci.py"
      - "tests/test_janus_pe_jet_universality.py"
      - "tests/test_janus_low_order_jet_normal_forms.py"
      - "tests/test_janus_metric_normal_ricci.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/pe-jet-universality.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Keep only the current failing/new gate here. Clear this string once it is
  # covered by the full build and no longer needs a fast diagnostic pass.
  LEAN_TARGET: JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusConnectionCorrectedActualJetBridge

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore Lake build cache
        id: lake-cache
        uses: actions/cache/restore@v5
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}
          restore-keys: |
            lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}

      - name: Set up Lean once
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-github-cache: false
          use-mathlib-cache: false

      - name: Populate Mathlib cache only when missing
        run: |
          if [[ -n "$(find .lake/packages/mathlib/.lake/build -name Mathlib.olean -print -quit 2>/dev/null)" ]]; then
            echo "Mathlib build cache restored from GitHub cache; skipping lake exe cache get."
          else
            echo "Mathlib build cache missing; downloading upstream Mathlib cache."
            lake exe cache get
          fi

      - name: Build current targeted Lean gate
        if: ${{ env.LEAN_TARGET != '' }}
        run: |
          set +e
          lake build "$LEAN_TARGET" > targeted-lean.log 2>&1
          status=$?
          cat targeted-lean.log
          exit $status

      - name: Upload targeted Lean log
        if: ${{ always() && env.LEAN_TARGET != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pe-jet-universality-targeted-lean-log
          path: targeted-lean.log
          if-no-files-found: error

      - name: Build corrected jet-universality head and Riesz descent gates
        run: |
          set +e
          lake build \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusNormalFrameSmoothTransition \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusNormalFrameTransitionJetBridge \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorBundleDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorEquivariantDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorSmoothDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorLocalRegularityDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorMetricAtlasInterface \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedAtlas \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorPointwiseNormalBasisCover \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorPhysicalRealizationAtlas \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorCoveredPhysicalDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorStructuredJetInstantiation \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorVariableOverlapInstantiation \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorCanonicalFrameBridge \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorOpenDomainDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorOpenMetricAtlas \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedOpenAtlas \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorPointwiseBasisOpenDescent \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorOpenMovingFrame \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorOpenCanonicalTransition \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedOpenInstantiation \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedFramePackaging \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedSynthesisSmoothness \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedPhysicalRangeBridge \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedOrthogonalRange \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorProjectedSeedAdaptedFramePair \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorCanonicalProjectedSeedAssembly \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorGlobalCoefficientInstantiation \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorSmoothReducedJetBase \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusRieszShapeOperatorContinuousStructuredJetReduction \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusActualStructuredJetExtraction \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality.Gates.P0EFTJanusConnectionCorrectedActualJetBridge \
            > focused-lean.log 2>&1
          status=$?
          cat focused-lean.log
          exit $status

      - name: Upload focused Lean log
        if: ${{ always() && hashFiles('focused-lean.log') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: pe-jet-universality-lean-log
          path: focused-lean.log
          if-no-files-found: error

      - name: Save Lake build cache after targeted/full attempt
        if: ${{ always() && steps.lake-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .lake
          key: lake-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('lean-toolchain') }}-${{ hashFiles('lake-manifest.json') }}-${{ github.sha }}

  python-audit:
    needs: lean
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pytest
      - name: Run executable audits
        run: |
          python scripts/audit_janus_pe_jet_universality.py
          python scripts/audit_janus_low_order_jet_normal_forms.py
          python scripts/audit_janus_metric_normal_ricci.py
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q \
            tests/test_janus_pe_jet_universality.py \
            tests/test_janus_low_order_jet_normal_forms.py \
            tests/test_janus_metric_normal_ricci.py
