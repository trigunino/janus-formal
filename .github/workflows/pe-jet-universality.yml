name: Program PE jet universality

on:
  push:
    branches:
      - research/fundamental-geometry-d
    paths:
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality.lean"
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality/**"
      - "docs/program_pe_jet_universality_proof.md"
      - "docs/program_pe_lemma2_naturality_equivariance.md"
      - "scripts/audit_janus_pe_jet_universality.py"
      - "tests/test_janus_pe_jet_universality.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/pe-jet-universality.yml"
  pull_request:
    paths:
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality.lean"
      - "JanusFormal/Branches/FundamentalGeometryPEJetUniversality/**"
      - "docs/program_pe_jet_universality_proof.md"
      - "docs/program_pe_lemma2_naturality_equivariance.md"
      - "scripts/audit_janus_pe_jet_universality.py"
      - "tests/test_janus_pe_jet_universality.py"
      - "lean-toolchain"
      - "lakefile.lean"
      - "lake-manifest.json"
      - ".github/workflows/pe-jet-universality.yml"
  workflow_dispatch:

jobs:
  lean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Lean and Mathlib cache
        uses: leanprover/lean-action@v1
        with:
          auto-config: false
          build: false
          test: false
          lint: false
          use-mathlib-cache: true
      - name: Build corrected jet-universality head
        run: |
          set +e
          lake build \
            JanusFormal.Branches.FundamentalGeometryPEJetUniversality \
            > program-pe-lean.log 2>&1
          status=$?
          cat program-pe-lean.log
          exit $status
      - name: Upload Program PE Lean log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: program-pe-lean-log
          path: program-pe-lean.log
          if-no-files-found: error

  python-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip pytest
      - run: python scripts/audit_janus_pe_jet_universality.py
      - name: Run focused tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest -q tests/test_janus_pe_jet_universality.py
